name: Branch Name Validation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  branch-name-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check branch name format
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref }}"

          echo "🔍 Checking branch name: $BRANCH_NAME"

          # Allow main branch
          if [ "$BRANCH_NAME" = "main" ]; then
            echo "✅ Branch name is valid: $BRANCH_NAME"
            exit 0
          fi

          # Allow dependabot and renovate branches
          if [[ "$BRANCH_NAME" == dependabot/* ]] || [[ "$BRANCH_NAME" == renovate/* ]]; then
            echo "✅ Branch name is valid: $BRANCH_NAME"
            exit 0
          fi

          # Check for valid prefixes and allow optional parentheses
          if [[ "$BRANCH_NAME" =~ ^(feature|bugfix|hotfix|refactor|docs|test|ci|chore|release)(\([a-z0-9._-]+\))?\/[a-z0-9._-]+$ ]]; then
            echo "✅ Branch name is valid: $BRANCH_NAME"
            exit 0
          fi

          echo "❌ Branch name '$BRANCH_NAME' does not follow the naming convention."
          echo ""
          echo "Valid branch name prefixes:"
          echo "  - feature/    (for new features)"
          echo "  - bugfix/     (for bug fixes)"
          echo "  - hotfix/     (for hotfixes)"
          echo "  - refactor/   (for refactoring)"
          echo "  - docs/       (for documentation)"
          echo "  - test/       (for tests)"
          echo "  - ci/         (for CI/CD updates)"
          echo "  - chore/      (for chores and maintenance)"
          echo "  - release/    (for releases)"
          echo "  - dependabot/ (for dependency updates)"
          echo "  - renovate/   (for dependency updates)"
          echo ""
          echo "Examples of valid branch names:"
          echo "  - feature(caculation)/add-pit-calculator"
          echo "  - bugfix/fix-tax-calculation"
          echo "  - docs/update-readme"
          echo "  - ci/add-github-actions"
          echo "  - chore/update-dependencies"
          echo "  - release/v1.0.0"
          echo "  - dependabot/go/module-name-1.0.0"
          echo "  - renovate/configure"
          exit 1
